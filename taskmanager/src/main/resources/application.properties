spring.application.name=task-manager

server.port=8088

# ==========================================
# 1. Database Connection Configuration
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/taskdb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 2. JPA & Hibernate DDL Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# 3. SQL Logging, Formatting & Open-In-View
# ==========================================
# Enables logging of SQL statements to the console
spring.jpa.show-sql=true

# Pretty-prints and formats the logged SQL statements for better readability
spring.jpa.properties.hibernate.format_sql=true

# Adds comments to the generated SQL to show why a query was generated
spring.jpa.properties.hibernate.use_sql_comments=true

# Controls the Open EntityManager in View pattern (true by default, set to false for strict boundary control)
spring.jpa.open-in-view=true